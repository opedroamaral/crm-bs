<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Vendas — Entrar</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-teal-900 flex items-center justify-center p-4">

  <div class="w-full max-w-sm">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-teal-500 rounded-2xl shadow-xl mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white tracking-tight">CRM de Vendas</h1>
      <p class="text-slate-400 text-sm mt-1">Bruno Simplício</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <h2 class="text-lg font-semibold text-slate-800 mb-5">Entrar na sua conta</h2>

      <div id="err" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-xl px-4 py-3 mb-4"></div>

      <form id="form" class="space-y-4" autocomplete="on">
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-1.5">E-mail</label>
          <input id="email" type="email" required autocomplete="email"
            placeholder="seu@email.com"
            class="w-full px-4 py-3 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400
                   focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent transition">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-1.5">Senha</label>
          <input id="password" type="password" required autocomplete="current-password"
            placeholder="••••••••"
            class="w-full px-4 py-3 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400
                   focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent transition">
        </div>
        <button id="btn" type="submit"
          class="w-full bg-teal-600 hover:bg-teal-700 active:bg-teal-800 text-white font-semibold
                 py-3 rounded-xl transition duration-150 flex items-center justify-center gap-2">
          <svg id="spin" class="hidden animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
          </svg>
          <span id="btnlabel">Entrar</span>
        </button>
      </form>
    </div>

    <p class="text-center text-slate-500 text-xs mt-5">Use o mesmo e-mail e senha do Chatwoot</p>
  </div>

  <script src="/js/api.js"></script>
  <script>
    // Already logged in?
    (function () {
      const u = getUser();
      if (u) location.href = u.role === 'administrator' ? '/dashboard.html' : '/my-sales.html';
    })();

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('err');
      const spin  = document.getElementById('spin');
      const label = document.getElementById('btnlabel');
      errEl.classList.add('hidden');
      spin.classList.remove('hidden');
      label.textContent = 'Entrando…';

      try {
        const data = await api('POST', '/auth/login', {
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        });
        setToken(data.token);
        location.href = data.user.role === 'administrator' ? '/dashboard.html' : '/my-sales.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
        spin.classList.add('hidden');
        label.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
