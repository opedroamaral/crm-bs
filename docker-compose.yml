version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatwoot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatwoot_pass}
      POSTGRES_DB: ${POSTGRES_DB:-chatwoot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatwoot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  chatwoot-web:
    image: chatwoot/chatwoot:latest
    command: bundle exec rails s -p 3001 -b 0.0.0.0
    env_file: .env
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_NAME=CRM Bruno Simplicio
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - chatwoot_storage:/app/storage

  chatwoot-worker:
    image: chatwoot/chatwoot:latest
    command: bundle exec sidekiq -C config/sidekiq.yml
    env_file: .env
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - chatwoot_storage:/app/storage

  evolution-api:
    image: atendai/evolution-api:latest
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=${EVOLUTION_API_URL:-http://localhost:8080}
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-changeme}
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER:-chatwoot}:${POSTGRES_PASSWORD:-chatwoot_pass}@postgres:5432/${POSTGRES_DB:-chatwoot}
      - REDIS_URI=redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379
      - CHATWOOT_ENABLED=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  sales-module:
    build: ./sales-module
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-chatwoot}:${POSTGRES_PASSWORD:-chatwoot_pass}@postgres:5432/${POSTGRES_DB:-chatwoot}
      - CHATWOOT_URL=http://chatwoot-web:3001
      - JWT_SECRET=${JWT_SECRET:-change_this_secret_in_production}
      - PORT=3000
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      chatwoot-web:
        - service_started

volumes:
  postgres_data:
  redis_data:
  chatwoot_storage:
